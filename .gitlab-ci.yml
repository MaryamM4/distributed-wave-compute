stages:
- build
- test
- deploy

# Build Docker image
build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Building Docker Image..."
    - docker build --provenance=false --platform linux/amd64 -t $ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA ./math-engine
    - echo "Build completed."

# Test build
test_build:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Testing Docker build..."
    - docker build --provenance=false --platform linux/amd64 -t verify-build ./math-engine
    - echo "Test successful."
  needs: ["build_image"]

# Push image to AWS ECR
deploy_ecr:
  stage: deploy
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip install awscli
  script:
    - echo "Starting Deployment to ECR..."

    # Needs to build again for the image to also exist in this job
    - docker build --provenance=false --platform linux/amd64 -t $ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA ./math-engine

    - echo "Authenticating with AWS..."
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

    # Rename local Docker image to match AWS ECR repository path 
    # (Docker pushes require images to be named according to the remote registry)
    - echo "Tagging image for ECR..."
    - docker tag $ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA

    - echo "Pushing image to ECR..."
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA

    - echo "Deployment (ECR) Successfully Completed."
  needs: ["test_build"]

# Deploy to Kubernetes
# TODO: Consider CronJobs
deploy_k8s:
  stage: deploy
  image: amazon/aws-cli:2.15.0
  before_script:
      - aws --version

      # Force AWS IAM plugin to run once before kubectl tries to use it
      #- aws eks get-token --region $AWS_DEFAULT_REGION --cluster-name schrodinger-cluster > /dev/null

      # Install kubectl
      - curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.34.0/2024-01-04/bin/linux/amd64/kubectl
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/

      # Generate kubeconfig dynamically in the CI 
      - aws eks update-kubeconfig --region $AWS_DEFAULT_REGION --name schrodinger-cluster

  script:
    - echo "(k8 Job) Testing AWS CLI..."
    - aws sts get-caller-identity

    # Debug helper: If this fails, authentication problem. Othewise, job YAML. 
    - kubectl get nodes

    # Jobs are immutable in Kubernetes, so delete old one. Safe if job DNE
    - kubectl delete job schrodinger-job -n schrodinger || true  

    - echo "Setting env vars and creating Job..."
    - >
      envsubst '${AWS_ACCOUNT_ID} ${AWS_DEFAULT_REGION} ${ECR_REPOSITORY} ${CI_COMMIT_SHORT_SHA} ${REDIS_HOST}' \
      < kubernetes/schrodinger-job.yaml | kubectl apply -f -

    - echo "Deployment (Kubernetes) Successfully Completed."

  needs: ["deploy_ecr"]