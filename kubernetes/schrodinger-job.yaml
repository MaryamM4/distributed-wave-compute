apiVersion: batch/v1
kind: Job
metadata:
  name: schrodinger-job
  namespace: schrodinger 

spec:
  completions: 10             # total workers
  parallelism: 5              # run 5 at a time
  completionMode: Indexed     # REQUIRED for JOB_COMPLETION_INDEX

  template:
    spec:
      restartPolicy: Never

      # No longer needed, switched from EBS to EFS, whihc works across AZs.
      #nodeSelector: # EBS volumes can't attatch across AZ, so forcing pods
      #  topology.kubernetes.io/zone: us-west-2a      # to run in same zone.

      containers:
      - name: worker  # image: ECR image URI. 
        image: schrodinger-worker:stable # GitLab CI will override this placeholder.
        imagePullPolicy: Always

        env:
        - name: JOB_COMPLETION_INDEX
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']

        - name: TOTAL_JOBS
          value: "10"
        - name: GRID_SIZE
          value: "200"
        - name: TOTAL_STEPS
          value: "10000"

        - name: REDIS_HOST  # value: Redis EC2 public IP
          value: "placeholder" # GitLab CI will override 
        - name: REDIS_PORT
          value: "6379"

        volumeMounts:
        - name: results-storage
          mountPath: /data

      volumes:
      - name: results-storage
        persistentVolumeClaim:
          claimName: schrodinger-pvc